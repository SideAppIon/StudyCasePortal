<html lang="ru">
<head>

<title>Учебный Портал</title>

<script type="module">
// ╔══════════════════════════════════════════════════════════════╗
// ║  ШАГ 1: ВСТАВЬ СЮДА СВОИ КЛЮЧИ FIREBASE                    ║
// ║  Как получить — читай инструкцию в файле instruction.html   ║
// ╚══════════════════════════════════════════════════════════════╝
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, doc, getDocs, getDoc, setDoc, addDoc,
  updateDoc, deleteDoc, query, where, orderBy, serverTimestamp, onSnapshot }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey:            "AIzaSyBKlsuYCWuCKzTuzHliIRONZIKWz_Q2f6w",
  authDomain:        "studycaseportal-1b584.firebaseapp.com",
  projectId:         "studycaseportal-1b584",
  storageBucket:     "studycaseportal-1b584.firebasestorage.app",
  messagingSenderId: "704493714973",
  appId:             "1:704493714973:web:7247ed7fbf195ee87710f4"
};

// ── Инициализация ──────────────────────────────────────────────
const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

// ════════════════════════════════════════════════════════════════
//  УТИЛИТЫ
// ════════════════════════════════════════════════════════════════
function show(id)  { document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden')); const el = document.getElementById(id); if(el) el.classList.remove('hidden'); }
function toast(msg, type='info') {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}
function fmt(ts) { if(!ts) return '—'; const d = ts.toDate ? ts.toDate() : new Date(ts); return d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ════════════════════════════════════════════════════════════════
//  СОСТОЯНИЕ ПРИЛОЖЕНИЯ
// ════════════════════════════════════════════════════════════════
let currentUser = null;   // Firebase Auth user
let userProfile = null;   // Firestore profile {role, name, ...}
let selectedCourseId = null;
let selectedTopicId  = null;

// ════════════════════════════════════════════════════════════════
//  АВТОРИЗАЦИЯ
// ════════════════════════════════════════════════════════════════
onAuthStateChanged(auth, async user => {
  if (!user) { show('screen-login'); return; }
  const snap = await getDoc(doc(db,'users', user.uid));
  if (!snap.exists()) { show('screen-login'); toast('Пользователь не найден','error'); return; }
  currentUser = user;
  userProfile = snap.data();
  routeByRole();
});

function routeByRole() {
  document.getElementById('nav-username').textContent = userProfile.name || currentUser.email;
  document.getElementById('nav-role').textContent =
    userProfile.role === 'admin' ? 'Администратор' :
    userProfile.role === 'teacher' ? 'Преподаватель' : 'Студент';
  document.getElementById('app-nav').classList.remove('hidden');
  if (userProfile.role === 'admin')   { loadAdminCourses(); show('screen-admin-courses'); }
  else if (userProfile.role === 'teacher') { loadTeacherAnswers(); show('screen-teacher'); }
  else { loadStudentCourses(); show('screen-student-courses'); }
}

// Вход
document.getElementById('btn-login').addEventListener('click', async () => {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  if (!email || !pass) { toast('Заполни все поля','error'); return; }
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    toast('Неверный email или пароль','error');
  }
});

// Выход
document.getElementById('btn-logout').addEventListener('click', async () => {
  await signOut(auth);
  document.getElementById('app-nav').classList.add('hidden');
  show('screen-login');
  currentUser = null; userProfile = null;
});

// ════════════════════════════════════════════════════════════════
//  АДМИНИСТРАТОР — КУРСЫ
// ════════════════════════════════════════════════════════════════
async function loadAdminCourses() {
  const snap = await getDocs(collection(db,'courses'));
  const list = document.getElementById('admin-courses-list');
  list.innerHTML = '';
  if (snap.empty) { list.innerHTML = '<p class="empty-msg">Курсов пока нет. Создай первый!</p>'; return; }
  snap.forEach(d => {
    const c = d.data();
    const card = document.createElement('div');
    card.className = 'card course-card';
    card.innerHTML = `
      <div class="card-info">
        <h3>${esc(c.title)}</h3>
        <p>${esc(c.description||'')}</p>
      </div>
      <div class="card-actions">
        <button class="btn btn-secondary" onclick="openAdminTopics('${d.id}','${esc(c.title)}')">Темы</button>
        <button class="btn btn-ghost" onclick="deleteCourse('${d.id}')">Удалить</button>
      </div>`;
    list.appendChild(card);
  });
}

window.openAdminTopics = async (courseId, courseTitle) => {
  selectedCourseId = courseId;
  document.getElementById('admin-topics-course-title').textContent = courseTitle;
  await loadAdminTopics();
  show('screen-admin-topics');
};

async function loadAdminTopics() {
  const snap = await getDocs(collection(db,'courses',selectedCourseId,'topics'));
  const list = document.getElementById('admin-topics-list');
  list.innerHTML = '';
  const topics = [];
  snap.forEach(d => topics.push({id:d.id,...d.data()}));
  topics.sort((a,b)=>(a.order||0)-(b.order||0));
  if (!topics.length) { list.innerHTML='<p class="empty-msg">Тем пока нет. Создай первую!</p>'; return; }
  topics.forEach(t => {
    const card = document.createElement('div');
    card.className = 'card topic-card';
    card.innerHTML = `
      <div class="card-info">
        <h3>${esc(t.title)}</h3>
        <p class="topic-meta">Порядок: ${t.order||0}</p>
      </div>
      <div class="card-actions">
        <button class="btn btn-secondary" onclick="openEditTopic('${t.id}')">Редактировать</button>
        <button class="btn btn-primary" onclick="openAccessModal('${t.id}','${esc(t.title)}')">Доступ</button>
        <button class="btn btn-ghost" onclick="deleteTopic('${t.id}')">Удалить</button>
      </div>`;
    list.appendChild(card);
  });
}

// Создать курс
document.getElementById('btn-create-course').addEventListener('click', () => {
  document.getElementById('modal-course').classList.remove('hidden');
});
document.getElementById('btn-course-cancel').addEventListener('click', () => {
  document.getElementById('modal-course').classList.add('hidden');
});
document.getElementById('btn-course-save').addEventListener('click', async () => {
  const title = document.getElementById('course-title-input').value.trim();
  const desc  = document.getElementById('course-desc-input').value.trim();
  if (!title) { toast('Введи название курса','error'); return; }
  await addDoc(collection(db,'courses'), { title, description:desc, createdAt: serverTimestamp() });
  document.getElementById('modal-course').classList.add('hidden');
  document.getElementById('course-title-input').value='';
  document.getElementById('course-desc-input').value='';
  toast('Курс создан','success');
  loadAdminCourses();
});

window.deleteCourse = async (id) => {
  if (!confirm('Удалить курс? Все темы тоже удалятся.')) return;
  await deleteDoc(doc(db,'courses',id));
  toast('Курс удалён');
  loadAdminCourses();
};

// Создать тему
document.getElementById('btn-back-to-courses').addEventListener('click', () => {
  show('screen-admin-courses'); loadAdminCourses();
});
document.getElementById('btn-create-topic').addEventListener('click', () => {
  clearTopicForm();
  selectedTopicId = null;
  document.getElementById('topic-modal-title').textContent = 'Новая тема';
  document.getElementById('modal-topic').classList.remove('hidden');
});
document.getElementById('btn-topic-cancel').addEventListener('click', () => {
  document.getElementById('modal-topic').classList.add('hidden');
});

window.openEditTopic = async (topicId) => {
  selectedTopicId = topicId;
  const snap = await getDoc(doc(db,'courses',selectedCourseId,'topics',topicId));
  const t = snap.data();
  document.getElementById('topic-modal-title').textContent = 'Редактировать тему';
  document.getElementById('topic-title-input').value = t.title||'';
  document.getElementById('topic-order-input').value = t.order||0;
  document.getElementById('topic-text-input').value = t.text||'';
  document.getElementById('topic-video-input').value = t.videoUrl||'';
  document.getElementById('topic-images-input').value = (t.images||[]).join('\n');
  document.getElementById('topic-questions-input').value = (t.questions||[]).join('\n');
  document.getElementById('modal-topic').classList.remove('hidden');
};

function clearTopicForm() {
  ['topic-title-input','topic-order-input','topic-text-input','topic-video-input','topic-images-input','topic-questions-input']
    .forEach(id => document.getElementById(id).value='');
}

document.getElementById('btn-topic-save').addEventListener('click', async () => {
  const title = document.getElementById('topic-title-input').value.trim();
  if (!title) { toast('Введи название темы','error'); return; }
  const data = {
    title,
    order:     parseInt(document.getElementById('topic-order-input').value)||0,
    text:      document.getElementById('topic-text-input').value,
    videoUrl:  document.getElementById('topic-video-input').value.trim(),
    images:    document.getElementById('topic-images-input').value.split('\n').map(s=>s.trim()).filter(Boolean),
    questions: document.getElementById('topic-questions-input').value.split('\n').map(s=>s.trim()).filter(Boolean),
    updatedAt: serverTimestamp()
  };
  if (selectedTopicId) {
    await updateDoc(doc(db,'courses',selectedCourseId,'topics',selectedTopicId), data);
    toast('Тема обновлена','success');
  } else {
    data.createdAt = serverTimestamp();
    await addDoc(collection(db,'courses',selectedCourseId,'topics'), data);
    toast('Тема создана','success');
  }
  document.getElementById('modal-topic').classList.add('hidden');
  loadAdminTopics();
});

window.deleteTopic = async (id) => {
  if (!confirm('Удалить тему?')) return;
  await deleteDoc(doc(db,'courses',selectedCourseId,'topics',id));
  toast('Тема удалена');
  loadAdminTopics();
};

// ════════════════════════════════════════════════════════════════
//  АДМИНИСТРАТОР — УПРАВЛЕНИЕ ДОСТУПОМ К ТЕМАМ
// ════════════════════════════════════════════════════════════════
let accessTopicId = null;

window.openAccessModal = async (topicId, topicTitle) => {
  accessTopicId = topicId;
  document.getElementById('access-topic-name').textContent = topicTitle;
  // Загрузить всех студентов
  const usersSnap = await getDocs(query(collection(db,'users'), where('role','==','student')));
  // Загрузить уже открытый доступ
  const accessSnap = await getDocs(collection(db,'courses',selectedCourseId,'topics',topicId,'access'));
  const allowed = new Set();
  accessSnap.forEach(d => allowed.add(d.id));

  const list = document.getElementById('access-students-list');
  list.innerHTML = '';
  if (usersSnap.empty) { list.innerHTML='<p class="empty-msg">Студентов нет. Создай пользователей.</p>'; }
  usersSnap.forEach(d => {
    const u = d.data();
    const row = document.createElement('div');
    row.className = 'access-row';
    const checked = allowed.has(d.id) ? 'checked' : '';
    row.innerHTML = `
      <label class="access-label">
        <input type="checkbox" data-uid="${d.id}" ${checked}/>
        <span>${esc(u.name||u.email)}</span>
        <small>${esc(u.email)}</small>
      </label>`;
    list.appendChild(row);
  });
  document.getElementById('modal-access').classList.remove('hidden');
};

document.getElementById('btn-access-cancel').addEventListener('click', () => {
  document.getElementById('modal-access').classList.add('hidden');
});

document.getElementById('btn-access-save').addEventListener('click', async () => {
  const checkboxes = document.querySelectorAll('#access-students-list input[type=checkbox]');
  const saves = [];
  checkboxes.forEach(cb => {
    const uid = cb.dataset.uid;
    const ref = doc(db,'courses',selectedCourseId,'topics',accessTopicId,'access',uid);
    if (cb.checked) saves.push(setDoc(ref, { grantedAt: serverTimestamp() }));
    else saves.push(deleteDoc(ref));
  });
  await Promise.all(saves);
  toast('Доступ обновлён','success');
  document.getElementById('modal-access').classList.add('hidden');
});

// ════════════════════════════════════════════════════════════════
//  АДМИНИСТРАТОР — ПОЛЬЗОВАТЕЛИ
// ════════════════════════════════════════════════════════════════
document.getElementById('nav-users').addEventListener('click', () => {
  loadAdminUsers(); show('screen-admin-users');
});

async function loadAdminUsers() {
  const snap = await getDocs(collection(db,'users'));
  const list = document.getElementById('admin-users-list');
  list.innerHTML = '';
  snap.forEach(d => {
    const u = d.data();
    const row = document.createElement('div');
    row.className = 'card user-card';
    const roleLabel = u.role==='admin'?'Администратор':u.role==='teacher'?'Преподаватель':'Студент';
    row.innerHTML = `
      <div class="card-info">
        <h3>${esc(u.name||'Без имени')}</h3>
        <p>${esc(u.email)} · <span class="role-badge role-${u.role}">${roleLabel}</span></p>
      </div>
      <div class="card-actions">
        <button class="btn btn-ghost" onclick="deleteUser('${d.id}')">Удалить</button>
      </div>`;
    list.appendChild(row);
  });
}

document.getElementById('btn-create-user').addEventListener('click', () => {
  document.getElementById('modal-user').classList.remove('hidden');
});
document.getElementById('btn-user-cancel').addEventListener('click', () => {
  document.getElementById('modal-user').classList.add('hidden');
});

// Создание пользователя через Cloud Function (упрощённый вариант — через REST API Firebase Auth)
document.getElementById('btn-user-save').addEventListener('click', async () => {
  const name  = document.getElementById('user-name-input').value.trim();
  const email = document.getElementById('user-email-input').value.trim();
  const pass  = document.getElementById('user-pass-input').value;
  const role  = document.getElementById('user-role-select').value;
  if (!name||!email||!pass) { toast('Заполни все поля','error'); return; }
  try {
    // Используем REST API Firebase Auth для создания пользователя без смены текущей сессии
    const apiKey = firebaseConfig.apiKey;
    const res = await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${apiKey}`,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ email, password: pass, returnSecureToken: false })
    });
    const data = await res.json();
    if (data.error) { toast(data.error.message,'error'); return; }
    const uid = data.localId;
    await setDoc(doc(db,'users',uid), { name, email, role, createdAt: serverTimestamp() });
    toast('Пользователь создан','success');
    document.getElementById('modal-user').classList.add('hidden');
    ['user-name-input','user-email-input','user-pass-input'].forEach(id=>document.getElementById(id).value='');
    loadAdminUsers();
  } catch(e) { toast('Ошибка: '+e.message,'error'); }
});

window.deleteUser = async (uid) => {
  if (!confirm('Удалить пользователя из базы?')) return;
  await deleteDoc(doc(db,'users',uid));
  toast('Пользователь удалён из базы. Удали его также в Firebase Console → Authentication');
  loadAdminUsers();
};

// ════════════════════════════════════════════════════════════════
//  НАВИГАЦИЯ АДМИНИСТРАТОРА
// ════════════════════════════════════════════════════════════════
document.getElementById('nav-courses-admin').addEventListener('click', () => {
  loadAdminCourses(); show('screen-admin-courses');
});
document.getElementById('nav-answers-admin').addEventListener('click', () => {
  loadTeacherAnswers(); show('screen-teacher');
});

// ════════════════════════════════════════════════════════════════
//  ПРЕПОДАВАТЕЛЬ — ОТВЕТЫ СТУДЕНТОВ
// ════════════════════════════════════════════════════════════════
async function loadTeacherAnswers() {
  const snap = await getDocs(query(collection(db,'answers'), orderBy('createdAt','desc')));
  const list = document.getElementById('teacher-answers-list');
  list.innerHTML = '';
  if (snap.empty) { list.innerHTML='<p class="empty-msg">Ответов пока нет</p>'; return; }
  snap.forEach(d => {
    const a = d.data();
    const card = document.createElement('div');
    card.className = 'card answer-card';
    const statusClass = a.status==='checked' ? 'status-checked' : 'status-pending';
    const statusLabel = a.status==='checked' ? 'Проверено' : 'На проверке';
    card.innerHTML = `
      <div class="answer-header">
        <div>
          <strong>${esc(a.studentName||a.studentEmail)}</strong>
          <span class="answer-meta">· ${esc(a.topicTitle||'Тема')} · ${fmt(a.createdAt)}</span>
        </div>
        <span class="status-badge ${statusClass}">${statusLabel}</span>
      </div>
      <div class="answer-questions">
        ${(a.answers||[]).map((ans,i)=>`
          <div class="qa-block">
            <p class="question-text">Вопрос ${i+1}: ${esc(a.questions?.[i]||'')}</p>
            <p class="answer-text">${esc(ans)}</p>
          </div>`).join('')}
      </div>
      <div class="answer-feedback">
        <textarea class="feedback-input" placeholder="Комментарий преподавателя...">${esc(a.feedback||'')}</textarea>
        <button class="btn btn-primary" onclick="saveAnswerFeedback('${d.id}',this)">Сохранить отзыв</button>
      </div>`;
    list.appendChild(card);
  });
}

window.saveAnswerFeedback = async (answerId, btn) => {
  const textarea = btn.previousElementSibling;
  await updateDoc(doc(db,'answers',answerId), {
    feedback: textarea.value, status:'checked', checkedAt: serverTimestamp(),
    checkedBy: currentUser.uid
  });
  toast('Отзыв сохранён','success');
  loadTeacherAnswers();
};

document.getElementById('nav-answers-teacher').addEventListener('click', () => {
  loadTeacherAnswers(); show('screen-teacher');
});

// ════════════════════════════════════════════════════════════════
//  СТУДЕНТ — КУРСЫ
// ════════════════════════════════════════════════════════════════
async function loadStudentCourses() {
  const snap = await getDocs(collection(db,'courses'));
  const list = document.getElementById('student-courses-list');
  list.innerHTML = '';
  if (snap.empty) { list.innerHTML='<p class="empty-msg">Курсов пока нет</p>'; return; }
  snap.forEach(d => {
    const c = d.data();
    const card = document.createElement('div');
    card.className = 'card course-card clickable';
    card.innerHTML = `
      <div class="card-info">
        <h3>${esc(c.title)}</h3>
        <p>${esc(c.description||'')}</p>
      </div>
      <div class="card-arrow">→</div>`;
    card.addEventListener('click', () => openStudentCourse(d.id, c.title));
    list.appendChild(card);
  });
}

async function openStudentCourse(courseId, courseTitle) {
  selectedCourseId = courseId;
  document.getElementById('student-course-title').textContent = courseTitle;
  await loadStudentTopics(courseId);
  show('screen-student-topics');
}

async function loadStudentTopics(courseId) {
  const snap = await getDocs(collection(db,'courses',courseId,'topics'));
  const list = document.getElementById('student-topics-list');
  list.innerHTML = '';
  const topics = [];
  snap.forEach(d => topics.push({id:d.id,...d.data()}));
  topics.sort((a,b)=>(a.order||0)-(b.order||0));

  for (const t of topics) {
    const accessSnap = await getDoc(doc(db,'courses',courseId,'topics',t.id,'access',currentUser.uid));
    const hasAccess = accessSnap.exists();
    const card = document.createElement('div');
    card.className = `card topic-card ${hasAccess ? 'clickable' : 'locked'}`;
    card.innerHTML = `
      <div class="topic-lock-icon">${hasAccess ? '📖' : '🔒'}</div>
      <div class="card-info">
        <h3>${esc(t.title)}</h3>
        <p>${hasAccess ? 'Доступно для изучения' : 'Тема заблокирована'}</p>
      </div>`;
    if (hasAccess) {
      card.addEventListener('click', () => openStudentTopic(t));
    }
    list.appendChild(card);
  }
}

async function openStudentTopic(topic) {
  selectedTopicId = topic.id;
  document.getElementById('student-topic-title').textContent = topic.title;

  // Текст
  const textEl = document.getElementById('student-topic-text');
  textEl.innerHTML = (topic.text||'').replace(/\n/g,'<br/>');

  // Видео (Яндекс.Диск)
  const videoWrap = document.getElementById('student-topic-video-wrap');
  if (topic.videoUrl) {
    // Преобразуем ссылку Яндекс.Диска в embed-формат
    let videoUrl = topic.videoUrl;
    // Если это ссылка яндекс диска вида disk.yandex.ru/i/... — используем iframe плеер
    if (videoUrl.includes('disk.yandex') || videoUrl.includes('yadi.sk')) {
      videoWrap.innerHTML = `<iframe src="https://disk.yandex.ru/embedded/video?url=${encodeURIComponent(videoUrl)}" width="100%" height="400" frameborder="0" allowfullscreen></iframe>`;
    } else if (videoUrl.includes('youtube') || videoUrl.includes('youtu.be')) {
      // YouTube тоже поддерживаем
      const ytId = videoUrl.match(/(?:v=|youtu\.be\/)([\w-]{11})/)?.[1];
      videoWrap.innerHTML = ytId ? `<iframe src="https://www.youtube.com/embed/${ytId}" width="100%" height="400" frameborder="0" allowfullscreen></iframe>` : `<a href="${esc(videoUrl)}" target="_blank">Открыть видео</a>`;
    } else {
      // Прямая ссылка — тег video
      videoWrap.innerHTML = `<video controls width="100%"><source src="${esc(videoUrl)}"/></video>`;
    }
    videoWrap.classList.remove('hidden');
  } else {
    videoWrap.innerHTML = '';
    videoWrap.classList.add('hidden');
  }

  // Картинки
  const imagesWrap = document.getElementById('student-topic-images');
  imagesWrap.innerHTML = '';
  (topic.images||[]).forEach(url => {
    if (!url) return;
    const img = document.createElement('img');
    img.src = url; img.className = 'topic-image'; img.alt = 'Изображение';
    imagesWrap.appendChild(img);
  });

  // Вопросы
  const form = document.getElementById('student-answers-form');
  form.innerHTML = '';
  if ((topic.questions||[]).length) {
    document.getElementById('student-questions-section').classList.remove('hidden');
    // Загрузить уже отправленный ответ
    const prevSnap = await getDocs(query(collection(db,'answers'),
      where('studentId','==',currentUser.uid),
      where('topicId','==',topic.id)
    ));
    let prevAnswers = [];
    let prevStatus = null;
    let prevFeedback = '';
    prevSnap.forEach(d => { const data = d.data(); prevAnswers = data.answers||[]; prevStatus=data.status; prevFeedback=data.feedback||''; });

    if (prevStatus === 'checked') {
      form.innerHTML = `<div class="feedback-received"><h4>✅ Преподаватель проверил ваш ответ</h4><p>${esc(prevFeedback)||'Комментарий не добавлен'}</p></div>`;
    } else if (prevStatus === 'pending') {
      form.innerHTML = `<div class="feedback-pending">⏳ Ответ отправлен на проверку. Ожидайте.</div>`;
    } else {
      topic.questions.forEach((q,i) => {
        const block = document.createElement('div');
        block.className = 'qa-input-block';
        block.innerHTML = `<label class="question-label">Вопрос ${i+1}: ${esc(q)}</label>
          <textarea class="answer-textarea" data-index="${i}" placeholder="Ваш ответ..."></textarea>`;
        form.appendChild(block);
      });
      const submitBtn = document.createElement('button');
      submitBtn.className = 'btn btn-primary btn-submit';
      submitBtn.textContent = 'Отправить на проверку';
      submitBtn.addEventListener('click', () => submitAnswers(topic));
      form.appendChild(submitBtn);
    }
  } else {
    document.getElementById('student-questions-section').classList.add('hidden');
  }

  show('screen-student-topic');
}

async function submitAnswers(topic) {
  const textareas = document.querySelectorAll('#student-answers-form textarea');
  const answers = Array.from(textareas).map(t => t.value.trim());
  if (answers.some(a => !a)) { toast('Ответь на все вопросы','error'); return; }
  await addDoc(collection(db,'answers'), {
    studentId: currentUser.uid,
    studentEmail: currentUser.email,
    studentName: userProfile.name||currentUser.email,
    courseId: selectedCourseId,
    topicId: topic.id,
    topicTitle: topic.title,
    questions: topic.questions,
    answers,
    status: 'pending',
    createdAt: serverTimestamp()
  });
  toast('Ответы отправлены!','success');
  openStudentTopic(topic);
}

document.getElementById('btn-back-to-student-courses').addEventListener('click', () => {
  loadStudentCourses(); show('screen-student-courses');
});
document.getElementById('btn-back-to-student-topics').addEventListener('click', () => {
  openStudentCourse(selectedCourseId, document.getElementById('student-course-title').textContent);
});
document.getElementById('nav-my-courses').addEventListener('click', () => {
  loadStudentCourses(); show('screen-student-courses');
});

  const q = this.value.toLowerCase();
  document.querySelectorAll('.answer-card').forEach(card => {
    card.style.display = card.textContent.toLowerCase().includes(q) ? '' : 'none';

<script type="module">
// Показать нужные навигационные кнопки в зависимости от роли
// Этот код дополняет routeByRole из основного модуля
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// Ждём пока основной модуль инициализируется
setTimeout(() => {
  const originalRouteByRole = window.routeByRoleNav;
}, 100);

// Патчим навигацию — показываем нужные кнопки по роли
const navObserver = new MutationObserver(() => {
  const nav = document.getElementById('app-nav');
  if (!nav.classList.contains('hidden')) {
    const roleEl = document.getElementById('nav-role');
    const role = roleEl?.textContent;
    const isAdmin   = role === 'Администратор';
    const isTeacher = role === 'Преподаватель';
    const isStudent = role === 'Студент';
    document.getElementById('nav-courses-admin').classList.toggle('hidden', !isAdmin);
    document.getElementById('nav-users').classList.toggle('hidden', !isAdmin);
    document.getElementById('nav-answers-admin').classList.toggle('hidden', !isAdmin);
    document.getElementById('nav-answers-teacher').classList.toggle('hidden', !isTeacher);
    document.getElementById('nav-my-courses').classList.toggle('hidden', !isStudent);
    navObserver.disconnect();
  }
});
navObserver.observe(document.getElementById('app-nav'), { attributes: true, attributeFilter: ['class'] });
</script>
